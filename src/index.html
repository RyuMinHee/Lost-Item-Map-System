<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>분실물 지도 시스템</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>분실물 지도 시스템</h1>
        <p>지도 기반으로 분실물과 습득물을 등록하고 확인하는 웹 서비스</p>
    </header>

    <main>
        <section class="card">
            <h2>분실물 등록</h2>
            <p>분실한 물건의 종류, 특징, 위치, 시간을 등록합니다.</p>
            <button>등록하기</button>
        </section>

        <section class="card">
            <h2>습득물 등록</h2>
            <p>발견한 물건의 정보와 위치를 등록합니다.</p>
            <button>등록하기</button>
        </section>

        <section class="card">
            <h2>지도 조회</h2>
            <p>지도에서 분실물과 습득물의 위치를 확인합니다.</p>
            <div class="map-box">지도 API 연동 예정</div>
        </section>

        <section class="card">
            <h2>검색</h2>
            <input type="text" placeholder="물건 종류 또는 위치 검색">
            <button>검색</button>
        </section>
    </main>
</body>
</html>
